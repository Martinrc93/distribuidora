components:
  schemas:
    User:
      type: object
      required:
        - nombre
      properties:
        id:
          type: integer
          description: ID autogenerado para el usuario en la base de datos.
        nombre:
          type: string
          description: Nombre del usuario.
        createdAt:
          type: string
          format: date-time
          description: Fecha y hora de creación del usuario.
        updatedAt:
          type: string
          format: date-time
          description: Fecha y hora de la última modificación del usuario.
      example:
        id: 1
        nombre: Juan Pérez
        createdAt: "2026-05-22T15:57:10.000Z"
        updatedAt: "2026-05-22T15:57:10.000Z"

paths:
  /users/all:
    get:
      summary: Obtener todos los usuarios
      tags:
        - Usuarios
      responses:
        200:
          description: Lista de todos los usuarios.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        500:
          description: Error interno del servidor.

  /users/{id}:
    get:
      summary: Obtener un usuario por su ID
      tags:
        - Usuarios
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID único del usuario
      responses:
        200:
          description: Datos del usuario solicitado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        404:
          description: Usuario no encontrado.
        500:
          description: Error interno del servidor.

  /users:
    post:
      summary: Crear un nuevo usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nombre
              properties:
                nombre:
                  type: string
                  description: Nombre del nuevo usuario.
              example:
                nombre: Carlos Gómez
      responses:
        201:
          description: Usuario creado exitosamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        500:
          description: Error interno del servidor.
