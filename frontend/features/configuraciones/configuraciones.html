<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora - Configuración</title>
    <link rel="stylesheet" href="../../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="configuraciones.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-titles">
                    <h1><i class="fas fa-cog"></i>Configuración del Sistema</h1>
                </div>
            </header>

            <section class="config-container mt-4">
                <div class="card" style="background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary);">
                    <div class="card-header" style="border-bottom: 1px solid var(--border-color); padding: 1.5rem;">
                        <h4 class="mb-0"><i class="fas fa-print me-2"></i>Configuración de Impresión</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="configForm">
                            <div class="row g-4">
                                <div class="col-12">
                                    <label for="nombre_negocio" class="form-label text-secondary">Nombre del Comercio</label>
                                    <input type="text" class="form-control bg-dark text-white border-secondary" id="nombre_negocio" placeholder="Ej: Distribuidora El Sol">
                                </div>
                                <div class="col-12">
                                    <label for="info_contacto" class="form-label text-secondary">Información de Contacto</label>
                                    <input type="text" class="form-control bg-dark text-white border-secondary" id="info_contacto" placeholder="Ej: LORENA 1150222520">
                                </div>
                            </div>
                            <div class="mt-4 d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4 py-2" style="background-color: #2563eb; border: none; border-radius: 6px;">
                                    <i class="fas fa-save me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>
        </main>

        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>
    </div>

    <!-- Contenedor para Notificaciones Toast -->
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

    <script src="../../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../../sidebar.js"></script>
    <!-- Script específico de la vista -->
    <script type="module" src="configuraciones.js"></script>
</body>
</html>
