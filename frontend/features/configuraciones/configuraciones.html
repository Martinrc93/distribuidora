<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora - Configuración</title>
    <link rel="stylesheet" href="../../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="configuraciones.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-titles">
                    <h1><i class="fas fa-cog"></i>Configuración del Sistema</h1>
                </div>
            </header>

            <section class="config-container mt-4">
                <div class="card" style="background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary);">
                    <div class="card-header" style="border-bottom: 1px solid var(--border-color); padding: 1.5rem;">
                        <h4 class="mb-0"><i class="fas fa-print me-2"></i>Configuración de Impresión</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="configForm">
                            <div class="row g-4">
                                <div class="col-12">
                                    <label for="nombre_negocio" class="form-label text-secondary">Nombre del Comercio</label>
                                    <input type="text" class="form-control bg-dark text-white border-secondary" id="nombre_negocio" placeholder="Ej: Distribuidora El Sol">
                                </div>
                                <div class="col-12">
                                    <label for="info_contacto" class="form-label text-secondary">Información de Contacto</label>
                                    <input type="text" class="form-control bg-dark text-white border-secondary" id="info_contacto" placeholder="Ej: LORENA 1150222520">
                                </div>
                            </div>
                            <div class="mt-4 d-flex justify-content-end">
                                <button type="submit" class="btn btn-primary px-4 py-2" style="background-color: #2563eb; border: none; border-radius: 6px;">
                                    <i class="fas fa-save me-2"></i> Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </section>

            <section class="config-container mt-4 mb-5">
                <div class="card card-updates" style="background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-primary);">
                    <div class="card-header" style="border-bottom: 1px solid var(--border-color); padding: 1.5rem;">
                        <h4 class="mb-0"><i class="fas fa-sync-alt me-2" style="color: #00d2ff;"></i>Actualizaciones del Sistema</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <p class="mb-1 text-secondary">Versión Instalada</p>
                                <h5 id="installedVersion" class="fw-bold">-</h5>
                            </div>
                            <div class="col-md-6">
                                <p class="mb-1 text-secondary">Versión Disponible</p>
                                <h5 id="availableVersion" class="fw-bold text-secondary">No buscado aún</h5>
                            </div>
                            <div class="col-12">
                                <p class="mb-1 text-secondary">Estado del Sistema</p>
                                <div id="updateStatusText" class="fw-semibold text-info"><i class="fas fa-info-circle me-1"></i>Listo para comprobar</div>
                                
                                <div id="downloadProgressContainer" class="mt-3 d-none">
                                    <div class="progress bg-dark" style="height: 10px; border-radius: 5px;">
                                        <div id="downloadProgressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                    </div>
                                    <div class="d-flex justify-content-between mt-1 small text-secondary">
                                        <span id="downloadProgressText">0%</span>
                                        <span id="downloadProgressBytes">0 MB / 0 MB</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div id="releaseNotesContainer" class="col-12 d-none">
                                <div class="p-3 bg-dark border border-secondary rounded">
                                    <h6 class="text-secondary mb-2">Notas de esta versión:</h6>
                                    <div id="releaseNotesContent" style="font-size: 0.9rem; max-height: 150px; overflow-y: auto; white-space: pre-wrap;"></div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-4 d-flex gap-2 justify-content-end">
                            <button id="btnCheckUpdates" class="btn btn-outline-light px-4 py-2" style="border-radius: 6px;">
                                <i class="fas fa-search me-2"></i> Buscar Actualizaciones
                            </button>
                            <button id="btnDownloadUpdate" class="btn btn-primary px-4 py-2 d-none" style="background-color: #10b981; border: none; border-radius: 6px;">
                                <i class="fas fa-download me-2"></i> Descargar
                            </button>
                            <button id="btnInstallUpdate" class="btn btn-warning px-4 py-2 d-none" style="color: #000; font-weight: 600; border: none; border-radius: 6px;">
                                <i class="fas fa-check-double me-2"></i> Crear backup e instalar
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Sidebar Container -->
        <div id="sidebar-container"></div>
    </div>

    <!-- Contenedor para Notificaciones Toast -->
    <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1100;"></div>

    <script src="../../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../../sidebar.js"></script>
    <!-- Script específico de la vista -->
    <script type="module" src="configuraciones.js"></script>
</body>
</html>
