<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora - Clientes</title>
    <link rel="stylesheet" href="../../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="clientes.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-titles">
                    <h1>CLIENTES</h1>
                </div>
                <button class="btn-primary" data-bs-toggle="modal" data-bs-target="#addClienteModal"><i class="fas fa-plus"></i> Añadir Cliente</button>
            </header>

            <section class="table-container">
                <table class="table table-hover table-borderless text-center">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Dirección</th>
                            <th>Contacto</th>
                            <th>Pedidos</th>
                            <th>Lista de precios</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </section>
        </main>

        <!-- Sidebar Container (Cargado Dinámicamente) -->
        <div id="sidebar-container"></div>
    </div>

    <!-- Modal Añadir Cliente -->
    <div class="modal fade" id="addClienteModal" tabindex="-1" aria-labelledby="addClienteModalLabel" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                <div class="modal-header" style="border-bottom: 1px solid var(--border-color);">
                    <h5 class="modal-title text-white" id="addClienteModalLabel">Añadir Nuevo Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="addClienteForm">
                        <div class="mb-3 w-75 mx-auto">
                            <label for="clienteNombre" class="form-label text-secondary">Nombre del Cliente</label>
                            <input type="text" class="form-control" id="clienteNombre" required>
                        </div>
                        <div class="mb-3 w-75 mx-auto">
                            <label for="clienteDireccion" class="form-label text-secondary">Dirección</label>
                            <input type="text" class="form-control" id="clienteDireccion">
                        </div>
                        <div class="mb-3 w-75 mx-auto">
                            <label for="clienteContacto" class="form-label text-secondary">Teléfono de Contacto</label>
                            <input type="tel" class="form-control" id="clienteContacto">
                        </div>
                        <div class="mb-3 w-75 mx-auto">
                            <label for="clienteListaPrecios" class="form-label text-secondary">Lista de Precios Asignada</label>
                            <select class="form-select" id="clienteListaPrecios">
                                <option value="1">Lista 1</option>
                                <option value="2">Lista 2</option>
                                <option value="3">Lista 3</option>
                                <option value="4">Lista 4</option>
                                <option value="5">Lista 5</option>
                                <option value="6">Lista 6</option>
                                <option value="7">Lista 7</option>
                                <option value="8">Lista 8</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--border-color);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="background-color: transparent; border: 1px solid var(--border-color);">Cancelar</button>
                    <button type="button" class="btn btn-primary" style="background-color: #2563eb; border: none;">Guardar Cliente</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Editar Cliente -->
    <div class="modal fade" id="editClienteModal" tabindex="-1" aria-labelledby="editClienteModalLabel" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                <div class="modal-header" style="border-bottom: 1px solid var(--border-color);">
                    <h5 class="modal-title text-white" id="editClienteModalLabel">Editar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="editClienteForm">
                        <input type="hidden" id="editClienteId">
                        <div class="mb-3 w-75 mx-auto">
                            <label for="editClienteNombre" class="form-label text-secondary">Nombre del Cliente</label>
                            <input type="text" class="form-control" id="editClienteNombre" required>
                        </div>
                        <div class="mb-3 w-75 mx-auto">
                            <label for="editClienteDireccion" class="form-label text-secondary">Dirección</label>
                            <input type="text" class="form-control" id="editClienteDireccion">
                        </div>
                        <div class="mb-3 w-75 mx-auto">
                            <label for="editClienteContacto" class="form-label text-secondary">Teléfono de Contacto</label>
                            <input type="tel" class="form-control" id="editClienteContacto">
                        </div>
                        <div class="mb-3 w-75 mx-auto">
                            <label for="editClienteListaPrecios" class="form-label text-secondary">Lista de Precios Asignada</label>
                            <select class="form-select" id="editClienteListaPrecios">
                                <option value="1">Lista 1</option>
                                <option value="2">Lista 2</option>
                                <option value="3">Lista 3</option>
                                <option value="4">Lista 4</option>
                                <option value="5">Lista 5</option>
                                <option value="6">Lista 6</option>
                                <option value="7">Lista 7</option>
                                <option value="8">Lista 8</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--border-color);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="background-color: transparent; border: 1px solid var(--border-color);">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnActualizarCliente" style="background-color: #2563eb; border: none;">Actualizar Cliente</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Historial de Pedidos -->
    <div class="modal fade" id="verPedidosModal" tabindex="-1" aria-labelledby="verPedidosModalLabel" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                <div class="modal-header" style="border-bottom: 1px solid var(--border-color);">
                    <h5 class="modal-title text-white" id="verPedidosModalLabel">Historial de Pedidos del Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <!-- Filtros de Fecha -->
                    <div class="row g-3 mb-4 align-items-end">
                        <div class="col-md-5">
                            <label for="filtroFechaMin" class="form-label text-secondary">Fecha Mínima</label>
                            <input type="date" class="form-control" id="filtroFechaMin">
                        </div>
                        <div class="col-md-5">
                            <label for="filtroFechaMax" class="form-label text-secondary">Fecha Máxima</label>
                            <input type="date" class="form-control" id="filtroFechaMax">
                        </div>
                        <div class="col-md-2">
                            <button type="button" class="btn btn-secondary w-100" id="btnLimpiarFiltros" style="height: 42px; border: 1px solid var(--border-color); background: transparent; font-size: 0.9rem;">Hoy</button>
                        </div>
                    </div>

                    <!-- Tabla de Pedidos -->
                    <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
                        <table class="table table-hover table-borderless text-center align-middle" style="font-size: 1rem; color: var(--text-primary);">
                            <thead>
                                <tr class="border-bottom" style="border-color: var(--border-color) !important;">
                                    <th class="text-secondary">Fecha</th>
                                    <th class="text-secondary">Empleado</th>
                                    <th class="text-secondary">Total</th>
                                </tr>
                            </thead>
                            <tbody id="tablaPedidosClienteBody">
                                <!-- Pedidos dinámicos -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--border-color);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="background-color: transparent; border: 1px solid var(--border-color);">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Contenedor para Notificaciones Toast -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="../../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="../../sidebar.js"></script>
    <script type="module" src="clientes.js"></script>
</body>

</html>
