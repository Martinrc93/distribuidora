<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora - Empleados</title>
    <link rel="stylesheet" href="../../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../global.css">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">

                    <h1>EMPLEADOS</h1>
                </div>

                        <tr>
                            <th>Nombre</th>
                            <th>Estado</th>
                            <th>Pedidos</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Carlos Gómez</td>
                            <td><span class="badge bg-success">Activo</span></td>
                            <td>
                                <button class="btn btn-sm" style="font-size: 0.75rem; border-radius: 6px; padding: 0.3rem 0.6rem; background-color: rgba(37, 99, 235, 0.15); color: #60a5fa; border: 1px solid rgba(37, 99, 235, 0.3); transition: all 0.3s ease;">Ver Pedidos</button>
                            </td>
                            <td>
                                <button class="btn btn-sm action-btn border-0"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm action-btn delete border-0"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>María López</td>
                            <td><span class="badge bg-success">Activo</span></td>
                            <td>
                                <button class="btn btn-sm" style="font-size: 0.75rem; border-radius: 6px; padding: 0.3rem 0.6rem; background-color: rgba(37, 99, 235, 0.15); color: #60a5fa; border: 1px solid rgba(37, 99, 235, 0.3); transition: all 0.3s ease;">Ver Pedidos</button>
                            </td>
                            <td>
                                <button class="btn btn-sm action-btn border-0"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm action-btn delete border-0"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>Juan Pérez</td>
                            <td><span class="badge bg-secondary">Inactivo</span></td>
                            <td>
                                <button class="btn btn-sm" style="font-size: 0.75rem; border-radius: 6px; padding: 0.3rem 0.6rem; background-color: rgba(37, 99, 235, 0.15); color: #60a5fa; border: 1px solid rgba(37, 99, 235, 0.3); transition: all 0.3s ease;">Ver Pedidos</button>
                            </td>
                            <td>
                                <button class="btn btn-sm action-btn border-0"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm action-btn delete border-0"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>

        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Distribuidora</h2>
                <p>Gestión de Productos, Empleados y Pedidos</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../dashboard/index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="../productos/productos.html"><i class="fas fa-box"></i> Productos</a></li>
                    <li><a href="empleados.html" class="active"><i class="fas fa-users"></i> Empleados</a></li>
