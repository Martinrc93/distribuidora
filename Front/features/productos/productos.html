<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distribuidora - Productos</title>
    <link rel="stylesheet" href="../../assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="productos.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-titles">
                    <h1>PRODUCTOS</h1>
                </div>
                <button class="btn-primary" data-bs-toggle="modal" data-bs-target="#addProductModal"><i class="fas fa-plus"></i> Añadir Producto</button>
            </header>

            <section class="table-container">
                <table class="table table-hover table-borderless text-center">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Marca</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Bebida Energética 500ml</td>
                            <td>Red Bull</td>
                            <td>
                                <button class="btn btn-sm action-btn border-0"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm action-btn delete border-0"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>Galletas de Chocolate 200g</td>
                            <td>Oreo</td>
                            <td>
                                <button class="btn btn-sm action-btn border-0"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm action-btn delete border-0"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>Agua Mineral 1L</td>
                            <td>Villavicencio</td>
                            <td>
                                <button class="btn btn-sm action-btn border-0"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm action-btn delete border-0"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                        <tr>
                            <td>Papas Fritas Clásicas 150g</td>
                            <td>Lay's</td>
                            <td>
                                <button class="btn btn-sm action-btn border-0"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm action-btn delete border-0"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </main>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Distribuidora</h2>
                <p>Gestión de Productos, Empleados y Pedidos</p>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../dashboard/index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                    <li><a href="productos.html" class="active"><i class="fas fa-box"></i> Productos</a></li>
                    <li><a href="../empleados/empleados.html"><i class="fas fa-users"></i> Empleados</a></li>
                    <li><a href="../pedidos/pedidos.html"><i class="fas fa-shopping-cart"></i> Pedidos</a></li>
                </ul>
            </nav>
        </aside>
    </div>

    <!-- Modal Añadir Producto -->
    <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-hidden="true" data-bs-theme="dark">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                <div class="modal-header" style="border-bottom: 1px solid var(--border-color);">
                    <h5 class="modal-title text-white" id="addProductModalLabel">Añadir Nuevo Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <form id="addProductForm">
                        <div class="mb-3 w-75 mx-auto">
                            <label for="productoNombre" class="form-label text-secondary" style="font-size: 0.85rem;">Nombre del Producto</label>
                            <input type="text" class="form-control form-control-sm" id="productoNombre" required style="background-color: #0f1623; color: white; border: 1px solid var(--border-color);">
                        </div>
                        <div class="mb-3 w-75 mx-auto">
                            <label for="productoMarca" class="form-label text-secondary" style="font-size: 0.85rem;">Marca</label>
                            <input type="text" class="form-control form-control-sm" id="productoMarca" required style="background-color: #0f1623; color: white; border: 1px solid var(--border-color);">
                        </div>
                        <div class="mb-3 w-75 mx-auto">
                            <label for="productoCosto" class="form-label text-secondary" style="font-size: 0.85rem;">Costo ($)</label>
                            <input type="number" step="0.01" class="form-control form-control-sm" id="productoCosto" required style="background-color: #0f1623; color: white; border: 1px solid var(--border-color);">
                        </div>
                    </form>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--border-color);">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="background-color: transparent; border: 1px solid var(--border-color);">Cancelar</button>
                    <button type="button" class="btn btn-primary" style="background-color: #2563eb; border: none;">Guardar Producto</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>
</html>
